data:
  metadata_csv: data/metadata.csv
  image_dir: data/roofs/
  mask_dir: data/masks/
  img_size: [512, 512]
  val_split: 0.15
  num_workers: 4

model:
  # backbone: resnet34 | efficientnet-b3 | mit-b2
  encoder: resnet34   
  encoder_weights: imagenet
  # auto-set by dataset, override if needed
  meta_dim: 8
  film_hidden_dim: 256

training:
  epochs: 100
  batch_size: 8
  lr: 0.0003
  lr_schedular: cosine # cosine | step | plateau
  weight_decay: 0.0001
  dice_weight: 0.5
  count_loss_weight: 0.3
  setback_loss_weight: 0.1
  early_stopping_patience: 15
  checkpoint_dir: checkpoint/

inference:
  threshold: 0.5
  output_dir: outputs/predictions/

logging:
  use_wandb: false
  project_name: solar-layout-designer
  run_name: baseline